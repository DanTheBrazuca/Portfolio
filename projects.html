<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projetos - Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <noscript><style>body{opacity:1;transform:none;}</style></noscript>
    <div id="aria-live" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <header class="site-header" role="banner">
        <div class="container">
            <a href="index.html" class="logo">Daniel Alves</a>
            <nav class="nav" role="navigation" aria-label="Primary">
                <a href="index.html#home" data-translate="navHome">Início</a>
                <a href="index.html#about" data-translate="navAbout">Sobre</a>
                <a href="index.html#work" data-translate="navWork">Projetos</a>
                <a href="index.html#contact" data-translate="navContact">Contato</a>
            </nav>
            <div class="toggles" role="group" aria-label="Utility controls">
                <button id="lang-toggle" class="toggle-btn" aria-label="Toggle language">EN</button>
                <button id="theme-toggle" class="toggle-btn" aria-label="Toggle theme">🌙</button>
                <button class="menu-toggle" aria-label="Toggle menu">☰</button>
                <button id="colorblind-toggle" class="toggle-btn" aria-label="Toggle colorblind mode">🟦</button>
            </div>
            <div id="colorblind-menu" class="colorblind-menu" role="menu" aria-label="Colorblind filter options" hidden>
                <button type="button" data-mode="off" data-translate="colorblindOff" role="menuitem">Off</button>
                <button type="button" data-mode="protanopia" data-translate="colorblindProtanopia" role="menuitem">Protanopia</button>
                <button type="button" data-mode="deuteranopia" data-translate="colorblindDeuteranopia" role="menuitem">Deuteranopia</button>
                <button type="button" data-mode="tritanopia" data-translate="colorblindTritanopia" role="menuitem">Tritanopia</button>
                <button type="button" data-mode="achromatopsia" data-translate="colorblindAchromatopsia" role="menuitem">Achromatopsia</button>
            </div>
        </div>
    </header>

    <main id="main-content" role="main">
        <section id="work" class="section projects" role="region" aria-labelledby="work-title">
            <div class="container">
                <h2 id="work-title" data-translate="workTitle">Projetos</h2>
                <div class="project-controls">
                    <button id="sort-oldest" class="btn btn-secondary" aria-label="Sort projects by oldest" data-translate="sortOldest">Mais antigo</button>
                    <button id="sort-newest" class="btn btn-secondary" aria-label="Sort projects by newest" data-translate="sortNewest">Mais novo</button>
                    <a href="index.html" class="btn" data-translate="showAllProjects">Voltar</a>
                </div>
                <div class="grid" id="projects-grid" role="list" aria-label="Project list"></div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p data-translate="footer">
                © 2026 Daniel Alves. All rights reserved.
                <br>
                Repositório: <a href="https://github.com/DanTheBrazuca/Portfolio" target="_blank" rel="noopener noreferrer">https://github.com/DanTheBrazuca/Portfolio</a>
            </p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
